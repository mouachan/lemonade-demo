---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lemonade-stand-system-prompt
  labels:
    app: lemonade-stand
    app.kubernetes.io/name: lemonade-stand
    app.kubernetes.io/component: config
data:
  prompt: |
    You are a helpful assistant specialized in lemons. You love talking about lemons and everything lemon-related (cultivation, varieties, storage, preparation, uses, safety, history, science, lemon-based recipes). Answer in a maximum of 10 sentences.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lemonade-stand
  labels:
    app: lemonade-stand
    app.kubernetes.io/name: lemonade-stand
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lemonade-stand
  template:
    metadata:
      labels:
        app: lemonade-stand
        app.kubernetes.io/name: lemonade-stand
    spec:
      containers:
        - name: lemonade-stand
          image: {{ .Values.app.image | default "quay.io/ckavili/lemon-fastapi:1.0.23" }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          env:
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: GUARDRAILS_ORCHESTRATOR_SERVICE_SERVICE_HOST
              value: "guardrails-orchestrator-service"
            - name: GUARDRAILS_ORCHESTRATOR_SERVICE_SERVICE_PORT
              value: "8032"
            - name: VLLM_MODEL
              value: {{ .Values.model.name | default "llama32" }}
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lemonade-stand-secrets
                  key: vllm-api-key
                  optional: true
          volumeMounts:
            - name: system-prompt
              mountPath: /system-prompt
              readOnly: true
          resources:
            limits:
              cpu: '2'
              memory: 2Gi
            requests:
              cpu: '1'
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: system-prompt
          configMap:
            name: lemonade-stand-system-prompt
            items:
              - key: prompt
                path: prompt
---
apiVersion: v1
kind: Service
metadata:
  name: lemonade-stand
  labels:
    app: lemonade-stand
    app.kubernetes.io/name: lemonade-stand
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: lemonade-stand
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: lemonade-stand
  labels:
    app: lemonade-stand
    app.kubernetes.io/name: lemonade-stand
    app.kubernetes.io/component: frontend
  annotations:
    haproxy.router.openshift.io/balance: roundrobin
    haproxy.router.openshift.io/disable_cookies: 'true'
    haproxy.router.openshift.io/rate-limit-connections: 'false'
    haproxy.router.openshift.io/timeout: 300s
    haproxy.router.openshift.io/timeout-tunnel: 300s
spec:
  to:
    kind: Service
    name: lemonade-stand
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
---
apiVersion: v1
kind: Secret
metadata:
  name: lemonade-stand-secrets
  labels:
    app: lemonade-stand
    app.kubernetes.io/name: lemonade-stand
    app.kubernetes.io/component: config
type: Opaque
stringData:
  vllm-api-key: {{ .Values.model.api_key | default "fake" }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: lemonade-stand
  labels:
    app: lemonade-stand
    app.kubernetes.io/name: lemonade-stand
    app.kubernetes.io/component: monitoring
spec:
  selector:
    matchLabels:
      app: lemonade-stand
  endpoints:
    - port: http
      path: /metrics
      interval: 3s
